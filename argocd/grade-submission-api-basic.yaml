apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grade-basic
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: apps/grade-submission-api-basic
  destination:
    server: https://kubernetes.default.svc
    namespace: grade-basic
  syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
      - CreateNamespace=true
